version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: gridpull_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - gridpull_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gridpull_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - LOG_FILE=/app/app.log
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
      - /opt/gridpull/app.log:/app/app.log
    expose:
      - "8000"
    depends_on:
      - redis
    networks:
      - gridpull_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gridpull_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - gridpull_net

  nginx:
    image: nginx:alpine
    container_name: gridpull_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gridpull_net

  certbot:
    image: certbot/certbot
    container_name: gridpull_certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  uploads_data:
  outputs_data:
  certbot_www:

networks:
  gridpull_net:
    driver: bridge
