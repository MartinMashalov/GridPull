# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name pdfexcel.ai www.pdfexcel.ai;
    return 301 https://$host$request_uri;
}

# HTTPS — main server
server {
    listen 443 ssl;
    server_name pdfexcel.ai www.pdfexcel.ai;

    ssl_certificate     /etc/nginx/certs/live/pdfexcel.ai/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/pdfexcel.ai/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Backend API + SSE
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE — disable buffering so events reach the browser immediately
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Frontend SPA
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
