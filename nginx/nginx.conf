# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name gridpull.com www.gridpull.com;

    # Let certbot complete HTTP-01 challenges without redirecting to HTTPS.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

# HTTPS — main server
server {
    listen 443 ssl;
    server_name gridpull.com www.gridpull.com;

    ssl_certificate     /etc/nginx/certs/live/gridpull.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/gridpull.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Also expose ACME challenges on HTTPS in case upstream rewrites HTTP.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Backend API + SSE
    location /api/ {
        client_max_body_size 100m;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE — disable buffering so events reach the browser immediately
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Frontend SPA
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
