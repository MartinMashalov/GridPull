server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html — never cache so browser always gets the latest entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Serve React SPA — always fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets (JS/CSS built by Vite) — cache forever, filename changes on rebuild
    location ~* \.(js|css|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images/icons — moderate cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
