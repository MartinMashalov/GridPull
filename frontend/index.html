    <!-- ═══ JSON-LD: FAQPage ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What types of documents does GridPull extract data from?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GridPull works on insurance documents (ACORD forms, submissions, carrier intake forms, supplemental applications), accounting documents (invoices, bank statements, 1099s, expense reports), financial reports (10-Ks, annual reports), contracts, purchase orders, and more. It handles digital PDFs, scanned documents, and photos (PNG, JPEG) using built-in OCR."
          }
        },
        {
          "@type": "Question",
          "name": "Is GridPull free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, GridPull is free to start with 10 credits per month — just sign up and begin extracting insurance documents, invoices, bank statements, and more. No credit card required. Each credit covers one file up to 50 pages. Plans start at $69/mo for 150 credits."
          }
        },
        {
          "@type": "Question",
          "name": "What if my PDFs are messy, scanned, or inconsistently formatted?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "That's exactly what this tool is built for. Unlike simple PDF converters that break on irregular layouts, our AI reads and understands the content of your documents — even when tables are misaligned, fonts vary, or the scan quality is poor."
          }
        },
        {
          "@type": "Question",
          "name": "What does the output look like?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You get a clean Excel (.xlsx) or CSV file. Each row represents one document. Each column represents one of the fields you chose to extract (like Invoice Number or Total Amount). It's ready to use — no reformatting needed."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is the extraction?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We achieve 99%+ field accuracy across thousands of real-world documents. Accuracy depends on document quality — clear, high-resolution PDFs produce the best results."
          }
        },
        {
          "@type": "Question",
          "name": "Are my files secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your files are encrypted during upload, processed in memory by AI only (no human ever sees them), and permanently deleted as soon as extraction is complete. We do not store your documents, and they are never used to train AI models or shared with anyone."
          }
        },
        {
          "@type": "Question",
          "name": "How is this different from a regular PDF-to-Excel converter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Regular converters just try to replicate the visual layout of a PDF in a spreadsheet — you get messy tables, merged cells, and broken formatting. GridPull actually reads and understands your documents. You tell it what data you need, and it extracts exactly those fields into a clean, structured spreadsheet."
          }
        },
        {
          "@type": "Question",
          "name": "Can I process multiple documents at once?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Upload as many files as you need in a single batch. Each document becomes one row in your output spreadsheet, with all your chosen fields filled in."
          }
        }
      ]
    }
    </script>
