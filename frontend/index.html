    <!-- ═══ JSON-LD: FAQPage ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What types of PDFs does this work on?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It works on virtually any PDF — invoices, financial reports, insurance forms, contracts, purchase orders, annual reports, and more. It handles both digital PDFs (text-based) and scanned documents (image-based) using built-in OCR. Even photos of documents (PNG, JPEG) are supported."
          }
        },
        {
          "@type": "Question",
          "name": "What if my PDFs are messy, scanned, or inconsistently formatted?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "That's exactly what this tool is built for. Unlike simple PDF converters that break on irregular layouts, our AI reads and understands the content of your documents — even when tables are misaligned, fonts vary, or the scan quality is poor."
          }
        },
        {
          "@type": "Question",
          "name": "What does the output look like?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You get a clean Excel (.xlsx) or CSV file. Each row represents one document. Each column represents one of the fields you chose to extract (like Invoice Number or Total Amount). It's ready to use — no reformatting needed."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is the extraction?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We achieve 94%+ field accuracy across thousands of real-world documents. Accuracy depends on document quality — clear, high-resolution PDFs produce the best results."
          }
        },
        {
          "@type": "Question",
          "name": "How much does it cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You pay per extraction — no monthly subscription, no commitment. Add funds to your account balance ($5, $10, $20, or any custom amount) and it depletes as you process documents. Your balance never expires."
          }
        },
        {
          "@type": "Question",
          "name": "Are my files secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your files are encrypted during upload, processed in memory by AI only (no human ever sees them), and permanently deleted as soon as extraction is complete. We do not store your documents, and they are never used to train AI models or shared with anyone."
          }
        },
        {
          "@type": "Question",
          "name": "How is this different from a regular PDF-to-Excel converter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Regular converters just try to replicate the visual layout of a PDF in a spreadsheet — you get messy tables, merged cells, and broken formatting. This tool actually reads and understands your documents. You tell it what data you need, and it extracts exactly those fields into a clean, structured spreadsheet."
          }
        },
        {
          "@type": "Question",
          "name": "Can I process multiple documents at once?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Upload as many files as you need in a single batch. Each document becomes one row in your output spreadsheet, with all your chosen fields filled in."
          }
        }
      ]
    }
    </script>
