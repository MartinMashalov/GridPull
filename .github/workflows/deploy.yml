name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 157.180.91.138
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Pull latest code
            if [ ! -d /opt/gridpull ]; then
              git clone https://github.com/${{ github.repository }} /opt/gridpull
            fi
            # Fix ownership drift (for example after manual SCP/upload) so git commands succeed.
            chown -R root:root /opt/gridpull
            cd /opt/gridpull
            git fetch origin main
            git reset --hard origin/main

            # Preserve existing .env files — they are managed on the server directly.
            # Only create them if they don't exist (first deploy).
            if [ ! -f backend/.env ]; then
              echo "WARNING: backend/.env missing — creating placeholder. Set values on server."
              touch backend/.env
            fi
            if [ ! -f frontend/.env ]; then
              echo "WARNING: frontend/.env missing — creating placeholder. Set values on server."
              touch frontend/.env
            fi

            # Enable SSH password login so you can: ssh root@157.180.91.138
            echo 'root:martin1234!' | chpasswd
            sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
            systemctl reload ssh || systemctl reload sshd || true

            # Ensure log file exists on host before container mounts it
            touch /opt/gridpull/app.log
            chmod 666 /opt/gridpull/app.log

            # Ensure cert directories exist and bootstrap temporary cert if missing.
            # This allows nginx to start so certbot can complete HTTP-01 validation.
            mkdir -p nginx/certs/live/pdfexcel.ai
            if [ ! -f nginx/certs/live/pdfexcel.ai/fullchain.pem ] || [ ! -f nginx/certs/live/pdfexcel.ai/privkey.pem ]; then
              openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                -keyout nginx/certs/live/pdfexcel.ai/privkey.pem \
                -out nginx/certs/live/pdfexcel.ai/fullchain.pem \
                -subj "/CN=pdfexcel.ai"
            fi

            # Build & restart containers
            docker compose down --remove-orphans --volumes || true
            docker rm -f gridpull_redis gridpull_backend gridpull_frontend gridpull_certbot 2>/dev/null || true
            docker compose build --no-cache
            docker compose up -d --remove-orphans

            # Request/renew a trusted certificate from Let's Encrypt using webroot.
            docker compose run --rm --entrypoint "" certbot certbot certonly \
              --webroot -w /var/www/certbot \
              --email admin@pdfexcel.ai \
              --agree-tos --no-eff-email --non-interactive --keep-until-expiring \
              -d pdfexcel.ai -d www.pdfexcel.ai
            docker compose exec -T nginx nginx -s reload

            # Prune old images
            docker image prune -f

            echo "Deployment complete."
            echo "Live log: tail -f /opt/gridpull/app.log"
