name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 157.180.91.138
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Pull latest code
            if [ ! -d /opt/gridpull ]; then
              git clone https://github.com/${{ github.repository }} /opt/gridpull
            fi
            cd /opt/gridpull
            git fetch origin main
            git reset --hard origin/main

            # Write backend .env from GitHub secrets
            cat > backend/.env << 'ENVEOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_DRIVE_CLIENT_ID=${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
            GOOGLE_DRIVE_CLIENT_SECRET=${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
            MICROSOFT_CLIENT_ID=${{ secrets.MICROSOFT_CLIENT_ID }}
            MICROSOFT_CLIENT_SECRET=${{ secrets.MICROSOFT_CLIENT_SECRET }}
            MICROSOFT_TENANT_ID=1a892709-1de3-4b21-ad34-c4343a121ea5
            DROPBOX_CLIENT_ID=${{ secrets.DROPBOX_CLIENT_ID || secrets.DROPBOX_APP_KEY }}
            DROPBOX_CLIENT_SECRET=${{ secrets.DROPBOX_CLIENT_SECRET || secrets.DROPBOX_APP_SECRET }}
            DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY || secrets.DROPBOX_CLIENT_ID }}
            DROPBOX_APP_SECRET=${{ secrets.DROPBOX_APP_SECRET || secrets.DROPBOX_CLIENT_SECRET }}
            BOX_CLIENT_ID=${{ secrets.BOX_CLIENT_ID || secrets.BOX_APP_KEY }}
            BOX_CLIENT_SECRET=${{ secrets.BOX_CLIENT_SECRET || secrets.BOX_APP_SECRET }}
            BOX_APP_KEY=${{ secrets.BOX_APP_KEY || secrets.BOX_CLIENT_ID }}
            BOX_APP_SECRET=${{ secrets.BOX_APP_SECRET || secrets.BOX_CLIENT_SECRET }}
            BACKEND_URL=https://${{ secrets.DOMAIN }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ALGORITHM=HS256
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            FRONTEND_URL=https://${{ secrets.DOMAIN }}
            DATABASE_URL=postgresql+asyncpg://gridpull:GridPull2026x@157.180.78.211:6432/gridpull
            REDIS_URL=redis://redis:6379
            UPLOAD_DIR=./uploads
            OUTPUT_DIR=./outputs
            ENVEOF

            # Write frontend .env
            cat > frontend/.env << 'ENVEOF'
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            VITE_API_URL=https://${{ secrets.DOMAIN }}
            ENVEOF

            # Enable SSH password login so you can: ssh root@157.180.91.138
            echo 'root:martin1234!' | chpasswd
            sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
            systemctl reload ssh || systemctl reload sshd || true

            # Ensure log file exists on host before container mounts it
            touch /opt/gridpull/app.log
            chmod 666 /opt/gridpull/app.log

            # Build & restart containers
            docker compose down --remove-orphans || true
            docker compose build --no-cache
            docker compose up -d --remove-orphans

            # Prune old images
            docker image prune -f

            echo "Deployment complete."
            echo "Live log: tail -f /opt/gridpull/app.log"
