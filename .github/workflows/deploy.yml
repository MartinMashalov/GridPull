name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 157.180.91.138
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Pull latest code
            if [ ! -d /opt/gridpull ]; then
              git clone https://github.com/${{ github.repository }} /opt/gridpull
            fi
            cd /opt/gridpull
            git pull origin main

            # Write backend .env from GitHub secrets
            cat > backend/.env << 'ENVEOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ALGORITHM=HS256
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            FRONTEND_URL=https://${{ secrets.DOMAIN }}
            DATABASE_URL=postgresql+asyncpg://gridpull:GridPull2026x@157.180.78.211:6432/gridpull
            REDIS_URL=redis://redis:6379
            UPLOAD_DIR=./uploads
            OUTPUT_DIR=./outputs
            ENVEOF

            # Write frontend .env
            cat > frontend/.env << 'ENVEOF'
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            VITE_API_URL=https://${{ secrets.DOMAIN }}
            ENVEOF

            # Enable SSH password login so you can: ssh root@157.180.91.138
            echo 'root:martin1234!' | chpasswd
            sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
            systemctl reload sshd

            # Ensure log file exists on host before container mounts it
            touch /opt/gridpull/app.log
            chmod 666 /opt/gridpull/app.log

            # Build & restart containers
            docker compose build --no-cache
            docker compose up -d --force-recreate

            # Prune old images
            docker image prune -f

            echo "Deployment complete."
            echo "Live log: tail -f /opt/gridpull/app.log"
